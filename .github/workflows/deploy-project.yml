name: Deploy Project

on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        id: tests
        run: npm test
      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tests.outcome }}" == "success" ]; then
            echo "- Tests: passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Tests: failed" >> $GITHUB_STEP_SUMMARY
          fi
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        id: eslint
        run: npm run lint
      - name: Run type check
        id: typecheck
        run: npm run typecheck
      - name: Lint summary
        if: always()
        run: |
          echo "## Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.eslint.outcome }}" == "success" ]; then
            echo "- ESLint: passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ESLint: failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.typecheck.outcome }}" == "success" ]; then
            echo "- Type check: passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Type check: failed" >> $GITHUB_STEP_SUMMARY
          fi
  deploy:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Install dependencies
        run: npm ci
      - name: Build project
        id: build
        run: npm run build
      - name: Deploy
        id: deploy
        run: echo "Deploying..."
      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "- Build: passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Build: failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "- Deploy: passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Deploy: failed" >> $GITHUB_STEP_SUMMARY
          fi
